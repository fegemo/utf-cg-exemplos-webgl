<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo: Look At</title>
  <link rel="stylesheet" href="../utils/styling/example.css">
  <script src="../utils/code/errors.js"></script>
</head>
<body>
  <main>
    <h1>Look At</h1>
    <p>
      Posiciona a câmera usando a função lookAt, que recebe 
      um ponto de origem, um ponto de destino e um vetor "up" para definir 
      a orientação da câmera.
    </p>
    <canvas class="example-canvas shadow" width="500" height="500"></canvas>
    <details>
      <summary>Instruções</summary>
      <div class="instructions">
        <p>
          Existem 3 configurações pré-definidas para a câmera, 
          cada uma visualizando a cena de um ponto de vista diferente. 
        </p>
        <div class="input-controls">
          <label for="input-camera"><ins>C</ins>âmera:</label>
          <span>
            <select id="input-camera" data-bind-select="state.cameras.current" data-bind-options="state.cameras.views" data-bind-option-value="$" data-bind-option-content="name">
            </select>
          </span>
        </div>
      </div>
    </details>
  </main>
  <script id="entry" type="module">
    import { setupWebGL, initialize, render, update } from './main.js';

    const gl = setupWebGL()
    await initialize(gl, 'simple')

    let lastTime = 0;
    function mainLoop(currentTime) {
      // (0) descobre o tempo decorrido desde o último frame (deltaTime)
      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
    
      // (1) atualiza o estado da aplicação (jogo, animação etc.)
      update(deltaTime);

      // (2) renderiza a cena sob o estado atual
      render(gl);

      // registra o próximo frame para ser executado o mais rápido possível
      requestAnimationFrame(mainLoop);
    }
    requestAnimationFrame(mainLoop);
  </script>
</body>
</html>
