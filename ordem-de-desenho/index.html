<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo: Ordem de Desenho</title>
  <link rel="stylesheet" href="../utils/styling/example.css">
  <link rel="stylesheet" href="../hello-resizable/resizable-canvas.css">
  <script src="../utils/code/errors.js"></script>
</head>
<body>
  <h1>Ordem de Desenho</h1>
  <p>Desenha elementos um em cima do outro.</p>
  <canvas class="example-canvas shadow" width="500" height="500"></canvas>
 
  <script type="shader/vertex">
    #version 300 es

    in vec3 position;
    uniform mat4 projection;

    void main() {
      gl_Position = projection * vec4(position, 1.0);
    }
  </script>
  <script type="shader/fragment">
    #version 300 es

    precision mediump float;
    out vec4 outColor;
    uniform vec4 color;

    void main() {
      outColor = color;
    }
  </script>
  <script type="module">
    import { setupWebGL, initialize, render } from './main.js'

    const gl = setupWebGL()
    initialize(gl)
    render(gl)
  </script>
</body>
</html>
