<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo: Rotação Simples</title>
  <link rel="stylesheet" href="../utils/styling/example.css">
</head>
<body>
  <main>
    <h1>Rotação Simples</h1>
    <p>Um único quadrado rotacionando no centro da tela.</p>
    <canvas class="example-canvas shadow" width="500" height="500"></canvas>
    <details>
      <summary>
        Instruções
      </summary>
      <div class="instructions">
        <p>A cada quadro de atualização (i.e., <code>update(dt)</code>), 
          calcula um novo ângulo de rotação de acordo com a velocidade.</p>
        <div class="input-controls">
          <div class="input-control-group">
            <label for="progress-angle">Ângulo:</label>
            <span>
              <progress max="6.283185307" value="0" data-bind-value="state.angle"></progress>
              <span data-bind-text="state.angle" data-bind-format="floatToDegree"></span>
            </span>
          </div>
          <div class="input-control-group">
            <label for="input-speed">Velocidade:</label>
            <span>
              <input type="range" id="input-speed" min="-12.566370616" max="12.566370616" step="0.01" value="0"
                data-bind-value="state.speed">
              <span data-bind-text="state.speed" data-bind-format="floatToPi"></span>
            </span>
          </div>
        </div>
      </div>
    </details>
  </main>

  <script type="shader/vertex">
    #version 300 es

    in vec2 position;

    // ℹ️ uma uniform mat3 contendo a rotação
    uniform mat3 transform;

    void main() {
        // ℹ️ a posição é multiplicada pela rotação
        vec3 newPosition = transform * vec3(position, 1.0);
        gl_Position = vec4(newPosition, 1.0);
    }
  </script>

  <script type="shader/fragment">
    #version 300 es
    precision highp float;
    out vec4 outColor;
    void main() {
      outColor = vec4(0.0, 0.5, 1.0, 1.0);
    }
  </script>

  <script id="entry" type="module">
    import { setupWebGL, initialize, render, update } from './main.js';

    const gl = setupWebGL();
    initialize(gl);

    let lastTime = 0;
    function mainLoop(currentTime) {
      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
      update(deltaTime);
      render(gl);
      requestAnimationFrame(mainLoop);
    }
    requestAnimationFrame(mainLoop);
  </script>
</body>
</html>



















<!-- ℹ️ necessário apenas para o exemplo, e não para uma aplicação real: -->
<!-- conecta a interface de controle (html) com o state da aplicação (js) -->
<script type="module">
    import { registerBindingContext } from '../utils/code/data-binding.js';
    import { state as appState } from './main.js';

    window.floatToPi = (v) => {
      const fractionOfPi = v / Math.PI;
      const howManyTurns = v / (2 * Math.PI);
      return `${fractionOfPi.toFixed(2)}π/s (${howManyTurns.toFixed(2)} voltas/s)`;
    };

    window.floatToDegree = (v) => {
      const degrees = v * (180 / Math.PI);
      return `${degrees.toFixed(0)}°`;
    };

    registerBindingContext('state', appState);
</script>
