<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo: Hello World (organizado)</title>
  <link rel="stylesheet" href="../utils/styling/example.css">
  <link rel="stylesheet" href="resizable-canvas.css">
  <script src="../utils/code/errors.js"></script>
</head>
<body>
  <h1>Hello World (redimensionável)!</h1>
  <p>Desenha um quadrado preto no espaço x, y ∈ [0, 100] (ou menor).</p>
  <div class="resizable-container shadow">
    <canvas class="example-canvas" width="500" height="500"></canvas>
  </div>
 
  <script type="shader/vertex">
    #version 300 es

    in vec2 position;
    // ℹ️ novo: matriz de projeção ortográfica
    uniform mat4 projection;

    void main() {
      // ℹ️ agora aplicamos a projeção ortográfica
      gl_Position = projection * vec4(position, 0.0, 1.0);
    }
  </script>
  <script type="shader/fragment">
    #version 300 es

    precision mediump float;
    out vec4 outColor;

    void main() {
      outColor = vec4(0.0, 0.0, 0.0, 1.0); // ℹ️ preto
    }
  </script>
  <script type="module">
    import { setupWebGL, initialize, render } from './main.js'

    const gl = setupWebGL()
    initialize(gl)
    render(gl)
  </script>
</body>
</html>
