<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo: Animação de Cor</title>
  <link rel="stylesheet" href="../utils/styling/example.css">
  <script src="../utils/code/errors.js"></script>
</head>
<body>
  <h1>Animação de Cor</h1>
  <p>Desenha um triângulo com cor animada, 
    entre <input type="color" value="#00ff00" id="color-begin" data-bind-value="state.colorBegin"> verde e 
    <input type="color" value="#0000ff" id="color-end" data-bind-value="state.colorEnd"> azul.
  </p>
  <canvas class="example-canvas shadow" width="500" height="500"></canvas>
  <script type="shader/vertex">
    #version 300 es

    in vec2 position;

    void main() {
        gl_Position = vec4(position, 0.0, 1.0);
    }
  </script>
  <script type="shader/fragment">
    #version 300 es

    precision highp float;
    
    //ℹ️ a uniform com a cor desejada
    uniform vec3 currentColor;

    out vec4 outColor;

    void main() {
        outColor = vec4(currentColor, 1.0);
    }
  </script>
  <script id="entry" type="module">
    import { setupWebGL, initialize, render, update } from './main.js';
    
    const gl = setupWebGL();
    initialize(gl);

    let lastTime = 0;
    function mainLoop(currentTime) {
      // (0) descobre o tempo decorrido desde o último frame (deltaTime)
      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
    
      // (1) atualiza o estado da aplicação (jogo, animação etc.)
      update(deltaTime);

      // (2) renderiza a cena sob o estado atual
      render(gl);

      // registra o próximo frame para ser executado o mais rápido possível
      requestAnimationFrame(mainLoop);
    }
    requestAnimationFrame(mainLoop);
  </script>
</body>
</html>
