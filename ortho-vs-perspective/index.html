<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo: Ortho vs Perspective</title>
  <link rel="stylesheet" href="../utils/styling/example.css">
  <script src="../utils/code/errors.js"></script>
</head>
<body>
  <main>
    <h1>Ortho vs Perspective</h1>
    <p>
      Desenha objetos tridimensionais projetados com projeção ortográfica e
      perspectiva.
    </p>
    <canvas class="example-canvas shadow" width="500" height="500"></canvas>
    <details>
      <summary>Instruções</summary>
      <div class="instructions">
        <p>
          Troque a projeção entre ortográfica e perspectiva, 
          e veja a diferença no resultado. 
        </p>
        <div class="input-controls">
          <label for="input-projection">Tipo de <ins>P</ins>rojeção:</label>
          <span>
            <select id="input-projection" data-bind-select="state.projectionType">
              <option value="perspective">Perspectiva</option>
              <option value="orthographic">Ortográfica</option>
            </select>
          </span>
        </div>
        <div class="input-controls">
          <label for="input-wireframe"><ins>W</ins>ireframe:</label>
          <span>
            <input type="checkbox" id="input-wireframe" checked data-bind-checked="state.wireframe">
          </span>
        </div>
        <div class="input-controls">
          <label for="input-t">Parâmetro t:</label>
          <span>
            <input type="range" id="input-t" min="0" max="1" step="0.01" value="0"
              data-bind-value="state.t">
            <span data-bind-text="state.t.toFixed(2)"></span>
          </span>
        </div>
        <dl class="controls-instructions">
          <dt><kbd data-bind-class="pressed:state.keys.ArrowUp">↑</kbd></dt>
          <dd>Aumenta o parâmetro t</dd>
          <dt><kbd data-bind-class="pressed:state.keys.ArrowDown">↓</kbd></dt>
          <dd>Diminui o parâmetro t</dd>
          <dt><kbd data-bind-class="pressed:state.autoIncrementT">Space</kbd></dt>
          <dd>Ativa/desativa incremento automático de t</dd>
        </dl>
      </div>
    </details>
  </main>
  <script id="entry" type="module">
    import { setupWebGL, initialize, render, update } from './main.js';

    const gl = setupWebGL()
    await initialize(gl, 'simple')

    let lastTime = 0;
    function mainLoop(currentTime) {
      // (0) descobre o tempo decorrido desde o último frame (deltaTime)
      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
    
      // (1) atualiza o estado da aplicação (jogo, animação etc.)
      update(deltaTime);

      // (2) renderiza a cena sob o estado atual
      render(gl);

      // registra o próximo frame para ser executado o mais rápido possível
      requestAnimationFrame(mainLoop);
    }
    requestAnimationFrame(mainLoop);
  </script>
</body>
</html>
